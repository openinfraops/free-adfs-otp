name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
          cache: true
          cache-dependency-path: |
            NuGet.Config
            **/*.csproj

      - name: Restore solution
        run: dotnet restore .\freeADFSOtp.sln --configfile .\NuGet.Config

      - name: Build solution
        shell: pwsh
        run: |
          $webVersion = (Get-Content -Path .\build\web.version -Raw).Trim()
          if ($webVersion -notmatch '^\d+\.\d+\.\d+$') {
            throw "Invalid web version '$webVersion' in build/web.version"
          }

          $adapterVersion = (Get-Content -Path .\build\adfs-adapter.version -Raw).Trim()
          if ($adapterVersion -notmatch '^\d+\.\d+\.\d+$') {
            throw "Invalid adapter version '$adapterVersion' in build/adfs-adapter.version"
          }

          echo "WEB_VERSION=$webVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "ADAPTER_VERSION=$adapterVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          dotnet build .\freeADFSOtp.sln -c Release --no-restore -p:Version=$webVersion

      - name: Prepare optional adapter signing/runtime inputs
        shell: pwsh
        run: |
          $keysDir = Join-Path $PWD "artifacts\keys"
          New-Item -ItemType Directory -Path $keysDir -Force | Out-Null

          function Get-RequiredValue([string]$filePath, [string]$prefix) {
            if (-not (Test-Path $filePath)) {
              throw "File not found: $filePath"
            }

            $line = (Get-Content -Path $filePath -Raw).Trim()
            if (-not $line.StartsWith("$prefix=")) {
              throw "Invalid format in $filePath. Expected prefix '$prefix='"
            }

            $value = $line.Substring($prefix.Length + 1).Trim()
            if ([string]::IsNullOrWhiteSpace($value)) {
              throw "Value for '$prefix' is empty in $filePath"
            }

            return $value
          }

          if ('${{ secrets.ADFS_ADAPTER_SNK_BASE64 }}') {
            $snkPath = Join-Path $keysDir "adfs-adapter.snk"
            [IO.File]::WriteAllBytes($snkPath, [Convert]::FromBase64String('${{ secrets.ADFS_ADAPTER_SNK_BASE64 }}'))
            "SIGN_ADAPTER=true" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            "ADAPTER_KEY_FILE=$snkPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }
          else {
            "SIGN_ADAPTER=false" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

          try {
            $base64File = Join-Path $PWD "lib\lib_2025_MISW_B64.txt"
            $shaFile = Join-Path $PWD "lib\lib_2025_MISW.sha256"
            $base64Value = Get-RequiredValue $base64File "lib_2025_MISW_B64"
            $expectedSha = (Get-RequiredValue $shaFile "lib_2025_MISW_SHA256").ToUpperInvariant()

            $adfsWebDllPath = Join-Path $keysDir "Microsoft.IdentityServer.Web.dll"
            [IO.File]::WriteAllBytes($adfsWebDllPath, [Convert]::FromBase64String($base64Value))

            $actualSha = (Get-FileHash -Algorithm SHA256 $adfsWebDllPath).Hash.ToUpperInvariant()
            if ($actualSha -ne $expectedSha) {
              throw "SHA256 mismatch for reconstructed AD FS DLL. Expected: $expectedSha Actual: $actualSha"
            }

            # Validate that the decoded bytes are a real .NET assembly.
            [void][System.Reflection.AssemblyName]::GetAssemblyName($adfsWebDllPath)

            "BUILD_ADFS_RUNTIME=true" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            "ADFS_WEB_DLL=$adfsWebDllPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            Write-Host "AD FS runtime DLL prepared from lib files with SHA256 verification"
          }
          catch {
            Write-Warning "Unable to prepare AD FS runtime DLL from lib files. Runtime build will be skipped. $($_.Exception.Message)"
            "BUILD_ADFS_RUNTIME=false" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

      - name: Run tests if present
        shell: pwsh
        run: |
          $testProjects = Get-ChildItem -Recurse -Filter *.csproj | Where-Object { $_.Name -match 'Tests?\.csproj$' }
          if (-not $testProjects) {
            Write-Host 'No test projects found. Skipping tests.'
            exit 0
          }

          foreach ($project in $testProjects) {
            Write-Host "Running tests for $($project.FullName)"
            dotnet test $project.FullName -c Release --no-build --logger "trx;LogFileName=$($project.BaseName).trx"
          }

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/*.trx'
          if-no-files-found: ignore

      - name: Generate ZIP packages
        if: success()
        shell: pwsh
        run: |
          $params = @{
            Configuration = 'Release'
            DotnetPath = 'dotnet'
            BuildAdfsRuntime = ($env:BUILD_ADFS_RUNTIME -eq 'true')
            AdapterVersion = $env:ADAPTER_VERSION
            WebVersion = $env:WEB_VERSION
            CreateBundle = $false
          }

          if ($env:SIGN_ADAPTER -eq 'true') {
            $params.SignAdapter = $true
            $params.AdapterKeyFile = $env:ADAPTER_KEY_FILE
          }

          if ($env:BUILD_ADFS_RUNTIME -eq 'true') {
            $params.AdfsWebDll = $env:ADFS_WEB_DLL
          }

          & .\deploy\package-artifacts.ps1 @params

      - name: Assemble single deployment bundle
        if: success()
        shell: pwsh
        run: |
          $zipRoot = Join-Path $PWD "artifacts\packages\zip"
          $bundleRoot = Join-Path $PWD "artifacts\packages\staging\ci-deployment-bundle"
          $deployTarget = Join-Path $bundleRoot "deploy"
          $bundleVersion = $env:WEB_VERSION
          if ([string]::IsNullOrWhiteSpace($bundleVersion)) {
            throw "WEB_VERSION is empty."
          }

          $bundleZipName = "freeADFSOTPy-$bundleVersion.zip"
          $bundleZip = Join-Path $zipRoot $bundleZipName

          if (Test-Path $bundleRoot) {
            Remove-Item -Recurse -Force $bundleRoot
          }

          New-Item -ItemType Directory -Path $deployTarget -Force | Out-Null

          Copy-Item -Recurse -Force .\deploy\* $deployTarget

          $requiredSuffixes = @(
            "api",
            "enrollment-portal",
            "admin-portal",
            "adfs-adapter"
          )

          foreach ($suffix in $requiredSuffixes) {
            $zip = Get-ChildItem -Path $zipRoot -Filter "*-$suffix.zip" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
            if ($null -eq $zip) {
              throw "Missing expected package zip for '$suffix' in $zipRoot"
            }

            Copy-Item -Force $zip.FullName (Join-Path $bundleRoot $zip.Name)
          }

          if (Test-Path $bundleZip) {
            Remove-Item -Force $bundleZip
          }

          Compress-Archive -Path (Join-Path $bundleRoot '*') -DestinationPath $bundleZip -CompressionLevel Optimal
          Write-Host "Bundle created: $bundleZip"

      - name: Upload deployment bundle
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-bundle
          path: artifacts/packages/zip/freeADFSOTPy-*.zip
          if-no-files-found: warn
